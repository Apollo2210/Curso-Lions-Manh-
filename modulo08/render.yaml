services:
- type: web
name: petshop
runtime: node
plan: free
buildCommand: "npminstall"
startCommand: "npmstart"
autoDeploy: true
envVars:
-key: NODE_ENV
value: "production"
-key: MONGO_URI
sync: false
-key: JWT_SECRET
generateValue: true
-key: JWT_EXPIRES_IN
value: "id"
-key: BCRYPT_SALT_ROUNDS
value: "10"
